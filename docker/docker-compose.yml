version: "3.9"

services:
  meis-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: meis-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - meis-data:/app/data
      - meis-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  meis-data:
  meis-logs: